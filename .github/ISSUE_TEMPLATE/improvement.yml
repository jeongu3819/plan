name: "개선 작업 (Improvement)"
description: "기존 기능 개선 작업을 등록합니다 (CLAUDE.md 형식)"
labels: ["type: feat", "status: planned"]
body:
  - type: dropdown
    id: area
    attributes:
      label: "영역 (Area)"
      options:
        - Frontend
        - Backend
        - Both
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "우선순위 (Priority)"
      options:
        - "High"
        - "Medium"
        - "Low"
    validations:
      required: true

  - type: textarea
    id: as-is
    attributes:
      label: "현재 상태 (As-Is)"
      description: "현재 어떻게 동작하는지 설명해주세요"
    validations:
      required: true

  - type: textarea
    id: to-be
    attributes:
      label: "목표 상태 (To-Be)"
      description: "개선 후 어떻게 동작해야 하는지 설명해주세요"
    validations:
      required: true

  - type: textarea
    id: implementation-checklist
    attributes:
      label: "구현 체크리스트"
      description: "백엔드/프론트엔드/테스트 섹션별로 작성해주세요"
      value: |
        ### Backend
        - [ ] 작업 항목

        ### Frontend
        - [ ] 작업 항목

        ### Test
        - [ ] 작업 항목
    validations:
      required: true

  - type: textarea
    id: affected-files
    attributes:
      label: "수정 대상 파일"
      description: "수정이 예상되는 파일 목록"
      placeholder: |
        - `backend/main.py`
        - `frontend/src/...`
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: "검증 기준"
      description: "이 개선이 완료되었다고 판단할 수 있는 기준"
    validations:
      required: true

  - type: checkboxes
    id: non-destructive
    attributes:
      label: "비파괴적 개발 원칙 확인"
      description: "아래 원칙을 모두 준수해야 합니다"
      options:
        - label: "기존 기능을 삭제하지 않습니다"
          required: true
        - label: "기존 API/화면/라우팅 동작을 유지합니다"
          required: true
        - label: "필요한 부분만 최소 수정 + 추가 기능 확장합니다"
          required: true
        - label: "기존 권한 로직을 대체하지 않고 조건 추가 방식으로 확장합니다"
          required: true
